<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prachi Pawar | Cinematic Motion Portfolio</title>
    <meta name="description" content="Cinematic motion-driven developer portfolio of Prachi Suhas Pawar.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <!-- Three.js Scene Container -->
    <div id="three-container"></div>

    <!-- HUD Overlay for text/info that moves with 3D elements -->
    <div id="hud-overlay"></div>

    <!-- Game-Style HUD Navigation -->
    <nav id="game-hud">
        <ul id="hud-menu">
            <li data-zone="0"><span>01</span> INTRO</li>
            <li data-zone="1"><span>02</span> ABOUT</li>
            <li data-zone="2"><span>03</span> SKILLS</li>
            <li data-zone="3"><span>04</span> HISTORY</li>
            <li data-zone="4"><span>05</span> PROJECTS</li>
            <li data-zone="5"><span>06</span> ACADEMIC</li>
            <li data-zone="6"><span>07</span> VAULT</li>
            <li data-zone="7"><span>08</span> PORTAL</li>
        </ul>
    </nav>

    <!-- Master Scene Track (keep data for JS to use) -->
    <div id="scroll-track"></div>

    <!-- GSAP & Plugins -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Three.js Post-processing (using compatible r128 examples) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
